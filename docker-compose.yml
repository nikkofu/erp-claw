version: "3.9"

services:
  postgres:
    image: postgres:15
    env_file:
      - configs/local/docker.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  nats:
    image: nats:2
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"

  minio:
    image: minio/minio:latest
    command: ["server", "/data"]
    env_file:
      - configs/local/docker.env
    ports:
      - "${MINIO_HTTP_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.74.0
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
